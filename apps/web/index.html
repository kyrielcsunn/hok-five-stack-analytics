<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eef2f4" />
    <title>王者五排战报工作台</title>
    <link rel="preload" as="fetch" href="/export/report-data.json" />
    <script type="text/javascript">
      // SPA redirect for GitHub Pages (spa-github-pages):
      // 404.html encodes path as ?/foo/bar — this script decodes it back.
      // No-op on Vercel/local where 404.html is never hit.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <style>
      html,
      body {
        margin: 0;
        background: #eef2f4;
        color: #18202f;
        font-family:
          Inter, "PingFang SC", "Microsoft YaHei", ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .initial-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        gap: 16px;
        padding: 24px;
        text-align: center;
      }
      .initial-loader__spinner {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid rgba(24, 32, 47, 0.12);
        border-top-color: #18202f;
        animation: initial-spin 0.9s linear infinite;
      }
      .initial-loader__hint {
        font-size: 14px;
        font-weight: 600;
        color: #536262;
      }
      @keyframes initial-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="initial-loader__spinner" aria-hidden="true"></div>
        <div class="initial-loader__hint">读取战报中…</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
